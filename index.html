<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Asistente Remoto">
    
    <link rel="icon" type="image/x-icon" href="LOGO.ICO.ico?v=1">
    <link rel="apple-touch-icon" href="LOGO.ICO.ico?v=1">
    <title>ASISTENTE REMOTO - JOSUE .P</title>
    
    <style>
        body { 
            background: #000; 
            color: #0f0; 
            font-family: 'Courier New', monospace; 
            text-align: center; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden;
        }
        .box { 
            border: 2px solid #0f0; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 0 20px #0f0; 
            width: 85%; 
            max-width: 450px; 
        }
        .logo-img { 
            width: 120px; 
            filter: drop-shadow(0 0 10px #0f0); 
            margin-bottom: 15px; 
        }
        #status { font-size: 1.2em; color: #ffeb3b; font-weight: bold; margin-top: 15px; text-transform: uppercase; }
        .instruccion { color: #888; font-size: 0.9em; margin-top: 10px; }
        
        /* Estilo del Login */
        #login-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        input {
            background: #111;
            border: 1px solid #0f0;
            color: #0f0;
            padding: 10px;
            margin: 10px;
            text-align: center;
            outline: none;
        }
        button {
            background: #0f0;
            color: #000;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
            font-family: 'Courier New', monospace;
        }
        button:hover { background: #0a0; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="login-screen">
        <img src="icono_djp.png.ico" class="logo-img" alt="LOGO">
        <h2>SISTEMA DE ACCESO</h2>
        <input type="text" id="user" placeholder="USUARIO">
        <input type="password" id="pass" placeholder="CONTRASEÑA">
        <button onclick="validarAcceso()">ENTRAR</button>
        <p id="error-msg" style="color: red; margin-top: 10px;"></p>
    </div>

    <div id="main-content" class="box hidden" onclick="activarVoz()">
        <img src="icono_djp.png.ico" class="logo-img" alt="LOGO">
        <h2 id="titulo">ASISTENTE REMOTO</h2>
        <div id="status">SISTEMA LISTO</div>
        <div id="log-voz" style="font-size: 0.8em; color: #0a0; margin-top: 10px;"></div>
        <p class="instruccion">Di: "abre Word", "abre Excel" o "quiero [música]"</p>
    </div>    

    <script>
        let recognition;
        const USUARIO_CORRECTO = "admin";
        const PASS_CORRECTO = "admin123";

        function validarAcceso() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;

            if (u === USUARIO_CORRECTO && p === PASS_CORRECTO) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                iniciarConfiguracionVoz();
            } else {
                document.getElementById('error-msg').innerText = "ACCESO DENEGADO";
            }
        }

        function iniciarConfiguracionVoz() {
            window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!window.SpeechRecognition) {
                alert("Este navegador no soporta reconocimiento de voz. Usa Chrome o Brave.");
                return;
            }

            recognition = new SpeechRecognition();
            recognition.lang = 'es-PE';
            recognition.continuous = true;
            recognition.interimResults = false;

            recognition.onstart = () => { 
                document.getElementById('status').innerText = "🔴 ESCUCHANDO..."; 
                document.getElementById('status').style.color = "red";
            };

            recognition.onresult = (event) => {
                const voz = event.results[event.results.length - 1][0].transcript.toLowerCase();
                document.getElementById('log-voz').innerText = "Escuchado: " + voz;

                // COMANDO: YOUTUBE
                if (voz.includes("quiero")) {
                    const busqueda = voz.split("quiero").pop().trim();
                    window.open("https://www.youtube.com/results?search_query=" + encodeURIComponent(busqueda), "_blank");
                }

                // COMANDO: ABRIR WORD
                if (voz.includes("abre word") || voz.includes("abrir word")) {
                    window.open("ms-word:ofe|u|https://www.office.com/launch/word", "_blank");
                }

                // COMANDO: ABRIR EXCEL
                if (voz.includes("abre excel") || voz.includes("abrir excel")) {
                    window.open("ms-excel:ofe|u|https://www.office.com/launch/excel", "_blank");
                }

                // COMANDO: ABRIR WHATSAPP
                if (voz.includes("abre whatsapp")) {
                    window.open("https://web.whatsapp.com/", "_blank");
                }
            };

            recognition.onend = () => {
                // Reinicia automáticamente para que siempre esté escuchando
                recognition.start();
            };
        }

        function activarVoz() {
            if (recognition) {
                try { recognition.start(); } catch(e) { console.log("Ya iniciado"); }
            }
        }
    </script>
</body>
</html>
