<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASISTENTE REMOTO - JOSUE .P</title>
    <style>
        body { 
            background: #000; color: #0f0; font-family: 'Courier New', monospace; 
            display: flex; flex-direction: column; justify-content: center; 
            align-items: center; height: 100vh; margin: 0; overflow: hidden;
        }
        .box { 
            border: 2px solid #0f0; padding: 30px; border-radius: 15px; 
            box-shadow: 0 0 20px #0f0; width: 85%; max-width: 450px; 
        }
        .logo-img { width: 120px; filter: drop-shadow(0 0 10px #0f0); margin-bottom: 15px; }
        input {
            background: #111; border: 1px solid #0f0; color: #0f0;
            padding: 12px; margin: 10px; width: 80%; text-align: center; outline: none;
        }
        #status { font-size: 1.2em; color: #ffeb3b; font-weight: bold; margin-top: 15px; }
        .hidden { display: none !important; }
        #error-msg { color: red; font-size: 0.8em; min-height: 1.2em; }
    </style>
</head>
<body>

    <div id="login-screen">
        <img src="LOGO.ICO.ico" class="logo-img" alt="LOGO">
        <h2>SISTEMA DE ACCESO</h2>
        <input type="text" id="user" placeholder="USUARIO" autocomplete="off">
        <input type="password" id="pass" placeholder="CONTRASEÑA">
        <div id="error-msg"></div>
        <p style="font-size: 0.7em; color: #555;">PRESIONA ENTER PARA INGRESAR</p>
    </div>

    <div id="main-content" class="box hidden">
        <img src="LOGO.ICO.ico" class="logo-img" alt="LOGO">
        <h2>ASISTENTE YOUTUBE</h2>
        <div id="status">SISTEMA LISTO</div>
        <div id="log-voz" style="font-size: 0.8em; color: #0a0; margin-top: 10px;"></div>
        <p style="color: #888; font-size: 0.9em;">Di: "Quiero [nombre de la música]"</p>
    </div>

    <script>
        const userIn = document.getElementById('user');
        const passIn = document.getElementById('pass');
        const errorMsg = document.getElementById('error-msg');

        // VALIDACIÓN CON ENTER
        [userIn, passIn].forEach(input => {
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    validarAcceso();
                }
            });
        });

        function validarAcceso() {
            if (userIn.value === "admin" && passIn.value === "admin123") {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                iniciarVoz();
            } else {
                errorMsg.innerText = "CONTRASEÑA INCORRECTA";
                passIn.value = "";
                passIn.focus();
            }
        }

        function iniciarVoz() {
            window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!window.SpeechRecognition) {
                alert("Para mejor experiencia usa Brave Browser");
                return;
            }

            const recognition = new SpeechRecognition();
            recognition.lang = 'es-PE';
            recognition.continuous = true;
            recognition.interimResults = false;

            recognition.onstart = () => {
                document.getElementById('status').innerText = "🔴 ESCUCHANDO...";
                document.getElementById('status').style.color = "red";
            };

            recognition.onresult = (event) => {
                const voz = event.results[event.results.length - 1][0].transcript.toLowerCase();
                document.getElementById('log-voz').innerText = "Pedido: " + voz;

                if (voz.includes("quiero")) {
                    const busqueda = voz.split("quiero").pop().trim();
                    // En celular, abrir en pestaña nueva permite que la anterior siga sonando
                    // hasta que el sistema operativo priorice la nueva.
                    window.open(`https://www.youtube.com/results?search_query=${encodeURIComponent(busqueda)}`, "_blank");
                }
            };

            recognition.onerror = () => recognition.stop();
            recognition.onend = () => recognition.start();
            
            recognition.start();
        }
    </script>
</body>
</html>
