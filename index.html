<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Asistente">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">

    <link rel="icon" type="image/x-icon" href="LOGO.ICO.ico">
    <link rel="apple-touch-icon" href="LOGO.ICO.ico">
    <title>ASISTENTE REMOTO - JOSUE .P</title>
    
    <style>
        * { box-sizing: border-box; }
        body { 
            background: #000; color: #0f0; font-family: 'Courier New', monospace; 
            display: flex; flex-direction: column; justify-content: center; 
            align-items: center; height: 100vh; margin: 0; overflow: hidden;
            padding: 20px;
        }

        /* Contenedor principal centrado */
        .container {
            display: flex; flex-direction: column; justify-content: center; 
            align-items: center; width: 100%; height: 100%;
        }

        .box { 
            border: 2px solid #0f0; padding: 40px 20px; border-radius: 20px; 
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.3); width: 100%; max-width: 400px; 
            display: flex; flex-direction: column; align-items: center;
        }

        /* Icono centrado y ajustado */
        .logo-img { 
            width: 140px; height: 140px; object-fit: contain;
            filter: drop-shadow(0 0 15px #0f0); margin-bottom: 25px; 
        }

        input {
            background: #111; border: 1px solid #0f0; color: #0f0;
            padding: 15px; margin: 10px 0; width: 90%; text-align: center; 
            outline: none; font-size: 16px; border-radius: 10px;
        }

        #status { font-size: 1.1em; color: #ffeb3b; font-weight: bold; margin-top: 20px; }
        .hidden { display: none !important; }
        #log-voz { font-size: 0.8em; color: #0a0; margin-top: 15px; min-height: 1.2em; text-align: center; }
        #error-msg { color: red; font-size: 0.9em; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="container">
        <div id="login-screen" class="box">
            <img src="LOGO.ICO.ico" class="logo-img" alt="LOGO">
            <h2 style="margin: 0 0 20px 0;">SISTEMA ACCESO</h2>
            <input type="text" id="user" placeholder="USUARIO" autocomplete="off">
            <input type="password" id="pass" placeholder="CONTRASEÑA">
            <div id="error-msg"></div>
            <button onclick="validarAcceso()" style="margin-top: 15px; background: #0f0; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer;">ENTRAR</button>
        </div>

        <div id="main-content" class="box hidden">
            <img src="LOGO.ICO.ico" class="logo-img" alt="LOGO">
            <h2 style="margin: 0;">ASISTENTE</h2>
            <div id="status">SISTEMA LISTO</div>
            <div id="log-voz"></div>
            <p style="color: #888; font-size: 0.8em; margin-top: 20px;">DI: "QUIERO [MUSICA]"</p>
        </div>
    </div>

    <script>
        const userIn = document.getElementById('user');
        const passIn = document.getElementById('pass');
        const errorMsg = document.getElementById('error-msg');

        // VALIDACIÓN CON ENTER
        [userIn, passIn].forEach(input => {
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') validarAcceso();
            });
        });

        function validarAcceso() {
            if (userIn.value === "admin" && passIn.value === "admin123") {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                iniciarVoz();
            } else {
                errorMsg.innerText = "DATOS INCORRECTOS";
                passIn.value = "";
                passIn.focus();
            }
        }

        function iniciarVoz() {
            window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!window.SpeechRecognition) {
                alert("Usa Brave para modo App");
                return;
            }

            const recognition = new SpeechRecognition();
            recognition.lang = 'es-PE';
            recognition.continuous = true;
            recognition.interimResults = false;

            recognition.onstart = () => {
                document.getElementById('status').innerText = "🔴 ESCUCHANDO...";
                document.getElementById('status').style.color = "red";
            };

            recognition.onresult = (event) => {
                const voz = event.results[event.results.length - 1][0].transcript.toLowerCase();
                document.getElementById('log-voz').innerText = "Voz: " + voz;

                if (voz.includes("quiero")) {
                    const busqueda = voz.split("quiero").pop().trim();
                    // Abrir en pestaña nueva para no cortar la voz del asistente
                    window.open(`https://www.youtube.com/results?search_query=${encodeURIComponent(busqueda)}`, "_blank");
                }
            };

            recognition.onend = () => recognition.start();
            recognition.start();
        }
    </script>
</body>
</html>
